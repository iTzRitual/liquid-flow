<!doctype html>
<html data-ng-app="lqSync">
<head>
    <title>{{ translations.eShop }} {{ translations.AppName }}</title>
    <script src="js/lib/jquery.min.js" type="text/javascript"></script>
    <script src="js/lib/angular.min.js" type="text/javascript"></script>
    <script src="js/lib/angular-route.min.js"></script>
    <script src="js/lib/angular-resource.min.js"></script>
    <script src="js/app.js" type="text/javascript"></script>
    <script src="js/services.js" type="text/javascript"></script>
    <script src="js/controllers.js" type="text/javascript"></script>
    <link rel="stylesheet" type="text/css" href="css/s.css" />
    <!--<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.5.0/css/font-awesome.min.css" />-->
</head>
<body>
    <div class="main">
        <header data-ng-controller="HeaderCtrl">
            <a href="#/">
                <h1>
                    <img src="favicon.ico" alt="{{ translations.eShop }}" />
                    <span>{{ translations.eShop }} <span>{{ translations.AppName }} <!--<span style="color: #777;">&beta;eta</span>--> <sub>{{ version }}</sub></span></span>
                </h1>
            </a>
            <div class="lng">
                {{ translations.Language }}
                <select data-ng-model="language.LanguageId" data-ng-change="change()">
                    <option data-ng-repeat="l in languages" value="{{ l.Id }}">{{ l.Name }}</option>
                </select>
            </div>
        </header>
        <div class="menu container" data-ng-controller="ShopListCtrl">
            <h2>
                {{ translations.Shops }}</h2>
            <div class="shops">
                <a class="card shop" data-ng-repeat="shop in shops" data-ng-class="{'act': currentShop.Id == shop.Id}" data-ng-href="{{ (currentShop.Id == shop.Id) ? '#/shop/templates' :'#/shop/'+shop.Id }}">
                    <label>
                        {{ shop.Name }}</label>
                    <span>{{ shop.Url }}</span> </a>
            </div>
            <div class="shop-add">
                <button data-ng-click="addShop()">
                    {{ translations.ShopAdd }}
                </button>
            </div>
        </div>
        <div class="content container" data-ng-view>
        </div>
        <footer>
            <a target="_blank" href="https://www.comarchesklep.pl/">{{ translations.eShop }}</a></footer>
        <div data-ng-controller="MsgCtrl">
            <div data-ng-repeat="m in msgs" class="msg {{m.type}}" data-ng-style="{'margin-top': ($index*72)+'px' }">
                {{ m.msg }}
            </div>
        </div>
    </div>
</body>
</html>
